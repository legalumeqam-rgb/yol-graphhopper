graphhopper:
  datareader.file: turkmenistan-latest.osm.pbf
  graph.location: /app/graph-cache

  profiles:
    - name: car
      custom_model_files: [car.json]
    - name: foot
      custom_model_files: [foot.json]
    - name: bike
      custom_model_files: [bike.json]

  profiles_ch:
    - profile: car

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 0.0.0.0
